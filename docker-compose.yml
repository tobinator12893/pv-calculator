services:
  server:
    build: ./server
    environment:
      - NODE_ENV=production
      - PORT=3001
      - AUTH_PASSWORD=${AUTH_PASSWORD:-solar2025}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "80:8080"
    environment:
      - VITE_CESIUM_ION_TOKEN=${VITE_CESIUM_ION_TOKEN}
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
